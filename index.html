  <meta name="keywords" content="Menna Aliwa, portfolio, web developer, IT student, Delta University, React, JavaScript, software developer" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://menna-portfolio-ruddy.vercel.app/" />
  <meta property="og:title" content="Menna Aliwa — Portfolio" />
  <meta property="og:description" content="IT Student & Aspiring Software Developer — Building smart web tools that solve real-world problems." />
  <meta property="og:image" content="https://menna-portfolio-ruddy.vercel.app/images/profile-2.jpeg" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://menna-portfolio-ruddy.vercel.app/" />
  <meta property="twitter:title" content="Menna Aliwa — Portfolio" />
  <meta property="twitter:description" content="IT Student & Aspiring Software Developer — Building smart web tools that solve real-world problems." />
  <meta property="twitter:image" content="https://menna-portfolio-ruddy.vercel.app/images/profile-2.jpeg" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0C0C0C" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <!-- Google Fonts: Outfit & Cairo -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet" />

  <style>
    /* ── Splash / Loading Screen ── */
    .splash-screen {
      position: fixed;
      inset: 0;
      background: #0C0C0C;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      font-family: 'Outfit', sans-serif;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    .splash-screen.hide {
      opacity: 0;
      visibility: hidden;
    }
    .splash-logo {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      background: linear-gradient(135deg, #C9739A, #E8A0BF, #D8B4D8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2.5rem;
      letter-spacing: -1px;
    }
    .splash-bar-track {
      width: min(220px, 60vw);
      height: 3px;
      background: rgba(201, 115, 154, 0.12);
      border-radius: 10px;
      overflow: hidden;
    }
    .splash-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #E8A0BF, #C9739A, #9B6BA8);
      border-radius: 10px;
      animation: splashLoad 2.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes splashLoad {
      0%   { width: 0%; }
      30%  { width: 40%; }
      60%  { width: 72%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Splash Screen (raw HTML — visible instantly before React boots) -->
  <div class="splash-screen" id="splash">
    <div class="splash-logo">menna.</div>
    <div class="splash-bar-track">
      <div class="splash-bar-fill"></div>
    </div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Register PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered:', reg.scope))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
